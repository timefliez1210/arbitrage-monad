[profile.default]
src = "src"
out = "out"
libs = ["lib"]
via_ir = true
optimizer = true
optimizer_runs = 200
remappings = [
    "@kuru/=lib/kuru/",
    "v4-core/=lib/v4-core/src/",
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
    "solmate/=lib/solmate/",
    "ds-test/=lib/solmate/lib/ds-test/src/",
    "v4-core-test/=lib/v4-core/test/",
    "solady/=lib/solady/"
]
